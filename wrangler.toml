name = "ptt-autosign"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Daily sign-in at 02:30 UTC (~10:30 Taipei). Matches the original
# trigger_layerci.yml schedule from the Python project.
[triggers]
crons = ["30 2 * * *"]

# Required secrets — set via:
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put PTT_ACCOUNTS    # JSON: [{"id":"alice","password":"..."}]
#   wrangler secret put RUN_TOKEN       # gates the manual /run endpoint
